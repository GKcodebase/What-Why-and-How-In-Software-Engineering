{{ define "main" }}
<div class="list-header">
    <h1 class="page-title">{{ .Title }}</h1>
    <div class="filter-controls">
        <select id="sort-select" onchange="sortBlogs(this.value)">
            <option value="date-desc">Newest First</option>
            <option value="date-asc">Oldest First</option>
            <option value="title-asc">Title (A-Z)</option>
        </select>
    </div>
</div>
<div class="blog-list" id="blog-container">
    {{ range .Pages }}
    <article class="blog-card" data-title="{{ .Title }}" data-date="{{ .Date.Unix }}"
        data-categories="{{ if .Params.categories }}{{ delimit .Params.categories " ," }}{{ end }}"
        data-tags="{{ if .Params.tags }}{{ delimit .Params.tags " ," }}{{ end }}">
        <div class="blog-meta">
            <time datetime="{{ .Date.Format " 2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
            <span class="category-list">
                {{ range .Params.categories }}
                <span class="tag cat-{{ . | urlize | lower }}">{{ . }}</span>
                {{ end }}
            </span>
        </div>
        <h2 class="blog-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <p class="blog-summary">{{ .Summary | truncate 150 }}</p>
        <div class="blog-card-tags">
            {{ range .Params.tags }}
            <a href="/tags/{{ . | urlize }}" class="tag">#{{ . }}</a>
            {{ end }}
        </div>
    </article>
    {{ end }}
</div>
{{ end }}
